spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fieldsync}
    username: ${DB_USER:fieldsync}
    password: ${DB_PASSWORD:fieldsync}
  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, never by Hibernate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32+chars-long-xyz}
    ttl-seconds: 3600